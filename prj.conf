# Console output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Sensor stack placeholder for IMU integration
CONFIG_SENSOR=y

# Power management placeholder support
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# BLE placeholder support
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_DEVICE_NAME="PawTrack"
